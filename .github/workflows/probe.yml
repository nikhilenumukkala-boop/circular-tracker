name: Probe SEBI access

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe SEBI endpoints
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          for u in \
            "https://www.sebi.gov.in/robots.txt" \
            "https://www.sebi.gov.in/sitemap.xml" \
            "https://www.sebi.gov.in/sebiweb/home/HomeAction.do?doListing=yes&sid=1&ssid=7&smid=0" \
            "https://www.sebi.gov.in/legal/circulars/jun-2026/clarification-with-respect-to-applicability-of-the-benefit-of-early-pay-in-in-commodity-derivatives-segment_102229.html" ; do
            echo "GET $u -> $(curl -s -o /tmp/last -w "%{http_code} %{size_download}b" -A "$UA" "$u")"
          done
          echo "--- robots.txt head ---"; curl -s -A "$UA" https://www.sebi.gov.in/robots.txt | head -30
          echo "--- pagination POST ---"
          curl -s -o /tmp/p2 -w "POST page2 -> %{http_code} %{size_download}b\n" -A "$UA" \
            -d "nextValue=1&next=n&doDirect=2&sid=1&ssid=7&smid=0&deptId=-1&intmId=-1&sText=Legal&ssText=Circulars&ssSubSectionId=7" \
            "https://www.sebi.gov.in/sebiweb/home/HomeAction.do?doListing=yes&sid=1&ssid=7&smid=0"
          grep -o "/legal/circulars/[a-z0-9/-]*_[0-9]*\.html" /tmp/p2 | head -3 || true
